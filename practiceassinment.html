<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
</head>

<body>

<h1>Feedback Form</h1>

<form>

    <label>Name:</label>
    <input type="text" placeholder="Write your name">
    <br><br>

    <label>Email:</label>
    <input type="email" placeholder="Write your email">
    <br><br>

    <label>Message:</label>
    <br>
    <textarea rows="6" cols="50"></textarea>
    <br><br>

    <label>Rate us our of 5:</label>
    <br>

    <input type="radio" name="rate"> 1 <br>
    <input type="radio" name="rate"> 2 <br>
    <input type="radio" name="rate"> 3 <br>
    <input type="radio" name="rate"> 4 <br>
    <input type="radio" name="rate"> 5 <br><br>

    <input type="submit" value="Send your message!">

</form>

</body>
</html>
