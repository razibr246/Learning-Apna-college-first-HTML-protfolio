<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form</title>
</head>
<body>

  <h1 id="title">Student Feedback Survey</h1>

  <p id="description">
    Please fill out this survey form to help us improve our services.
  </p>

  <form id="survey-form">

    <label id="name-label" for="name">Name</label>
    <input
      type="text"
      id="name"
      placeholder="Enter your name"
      required
    >

    <br><br>

    <label id="email-label" for="email">Email</label>
    <input
      type="email"
      id="email"
      placeholder="Enter your email"
      required
    >

    <br><br>

    <label id="number-label" for="number">Age</label>
    <input
      type="number"
      id="number"
      min="10"
      max="100"
      placeholder="Enter your age"
    >

    <br><br>

    <label for="dropdown">Favorite Subject</label>
    <select id="dropdown">
      <option value="math">Math</option>
      <option value="science">Science</option>
    </select>

    <br><br>

    <p>Choose your learning mode:</p>

    <input type="radio" id="online" name="learning" value="online">
    <label for="online">Online</label>

    <input type="radio" id="offline" name="learning" value="offline">
    <label for="offline">Offline</label>

    <br><br>

    <p>Select your interests:</p>

    <input type="checkbox" id="coding" value="coding">
    <label for="coding">Coding</label>

    <input type="checkbox" id="design" value="design">
    <label for="design">Design</label>

    <br><br>

    <textarea placeholder="Additional comments"></textarea>

    <br><br>

    <button type="submit" id="submit">Submit</button>

  </form>

</body>
</html>
